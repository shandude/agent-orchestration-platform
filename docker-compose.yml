# Single-command local stack:  docker compose up --build
# Then open http://localhost:3000
services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      # Inside the compose network the DB lives on a named volume.
      DATABASE_URL: sqlite:///./data/orchestrator.db
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  backend_data:
